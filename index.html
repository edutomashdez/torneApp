<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tornea Pro V11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 14px; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #334155; }
        .btn-green { background: #22c55e; color: white; font-weight: bold; padding: 1rem; border-radius: 10px; width: 100%; border: none; cursor: pointer; display: block; text-align: center; }
        .btn-green:active { background: #16a34a; transform: scale(0.98); }
        .btn-play { background: #3b82f6; color: white; font-weight: 800; padding: 0.8rem; border-radius: 12px; flex: 1; text-transform: uppercase; font-size: 11px; }
        .btn-fast { background: #6366f1; color: white; font-weight: 800; padding: 0.8rem; border-radius: 12px; flex: 1; text-transform: uppercase; font-size: 11px; }
        input, select { background: #0f172a; border: 1px solid #444; padding: 0.5rem; border-radius: 6px; color: white; width: 100%; text-align: center; font-size: 16px; }
        .pista-tag { background: #d97706; color: white; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 900; }
        .alert-recuperar { background: #ca8a04; color: white; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto p-4 pb-20">
    <header class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black text-green-500 italic uppercase">Tornea Pro V11</h1>
        <div id="fase-info" class="badge bg-slate-800 px-2 py-1 rounded text-[10px] text-yellow-400 font-bold">Inicio</div>
    </header>

    <div id="pantalla-dinamica">
        <div id="area-recuperacion"></div>
        <div id="step-1">
            <div class="card">
                <h2 class="text-[10px] font-bold mb-4 uppercase text-slate-500 text-center tracking-widest">Ajustes</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 uppercase text-center">Tiempo de Ronda (Minutos)</label>
                        <input type="number" id="cfg-tiempo" value="20">
                    </div>
                    <div class="border-t border-slate-700 pt-4">
                        <select id="pistas-tipo" onchange="cambiarVistaPistas()" class="text-xs mb-3">
                            <option value="corr">Pistas Correlativas (1,2,3)</option>
                            <option value="manu">Pistas Manuales</option>
                        </select>
                        <div id="area-pistas-manuales" style="display: none;" class="grid grid-cols-3 gap-2">
                            <input type="number" id="p-val-1" value="1"> <input type="number" id="p-val-2" value="2"> <input type="number" id="p-val-3" value="3">
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="logicaSiguiente()" class="btn-green">SIGUIENTE</button>
        </div>
    </div>
</div>

<script>
let state = { 
    parejas: [], ronda: 1, resultados: 0, pistasReales: [1, 2, 3], 
    tiempoRonda: 20, cronosActivos: false, modificado: false, enProgreso: false 
};

window.onbeforeunload = () => state.enProgreso ? "Torneo en curso" : null;

function guardarEnDisco() { localStorage.setItem('tornea_backup', JSON.stringify(state)); }

window.onload = function() {
    const backup = localStorage.getItem('tornea_backup');
    if (backup) {
        const saved = JSON.parse(backup);
        if (saved.enProgreso) {
            document.getElementById('area-recuperacion').innerHTML = `
                <div class="alert-recuperar">
                    <p class="text-xs mb-2">⚠️ Torneo en curso detectado</p>
                    <button onclick="restaurarTorneo()" class="bg-white text-orange-600 px-3 py-1 rounded text-[10px] mr-2">REANUDAR</button>
                    <button onclick="borrarCache()" class="bg-orange-900 text-white px-3 py-1 rounded text-[10px]">BORRAR</button>
                </div>`;
        }
    }
};

function restaurarTorneo() {
    state = JSON.parse(localStorage.getItem('tornea_backup'));
    document.getElementById('area-recuperacion').innerHTML = "";
    renderPantallaJuego();
    mostrarPartidos();
}

function borrarCache() { localStorage.removeItem('tornea_backup'); location.reload(); }

function cambiarVistaPistas() {
    const s = document.getElementById('pistas-tipo').value;
    document.getElementById('area-pistas-manuales').style.display = (s === 'manu') ? 'grid' : 'none';
}

function logicaSiguiente() {
    state.tiempoRonda = document.getElementById('cfg-tiempo').value || 20;
    const s = document.getElementById('pistas-tipo').value;
    state.pistasReales = (s === 'manu') ? 
        [document.getElementById('p-val-1').value||1, document.getElementById('p-val-2').value||2, document.getElementById('p-val-3').value||3] : [1,2,3];

    document.getElementById('fase-info').innerText = "Jugadores";
    let html = `<div id="step-2"><div id="lista-jugadores" class="grid grid-cols-1 gap-2 mb-4 h-[65vh] overflow-y-auto pr-1">`;
    for(let i=0; i<12; i++) {
        const posDef = (i % 2 === 0) ? "reves" : "drive";
        html += `
            <div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700/50">
                <div class="flex gap-2 mb-2"><span class="text-[10px] text-slate-500 font-bold w-4">${i+1}</span><input type="text" placeholder="Jugador" class="p-name !text-left h-9"></div>
                <div class="flex gap-2">
                    <select class="p-pos bg-slate-700 h-8 text-xs" onchange="state.modificado=true">
                        <option value="reves" ${posDef==='reves'?'selected':''}>Revés</option>
                        <option value="drive" ${posDef==='drive'?'selected':''}>Drive</option>
                        <option value="poli">Polivalente</option>
                    </select>
                    <select class="p-lvl bg-slate-700 h-8 text-xs" onchange="state.modificado=true">
                        <option value="25">Nivel 25</option><option value="50" selected>Nivel 50</option><option value="75">Nivel 75</option>
                    </select>
                </div>
            </div>`;
    }
    html += `</div><button onclick="finalizarConfig()" class="btn-green uppercase">Iniciar Torneo</button></div>`;
    document.getElementById('pantalla-dinamica').innerHTML = html;
}

function finalizarConfig() {
    const names = document.querySelectorAll('.p-name');
    const lvls = document.querySelectorAll('.p-lvl');
    const poss = document.querySelectorAll('.p-pos');
    let pool = [];
    names.forEach((n, i) => pool.push({n: n.value || `J${i+1}`, l: parseInt(lvls[i].value), p: poss[i].value }));

    state.parejas = [];
    if (!state.modificado) {
        for (let i = 0; i < pool.length; i += 2) state.parejas.push({ nombres: `${pool[i].n} / ${pool[i+1].n}`, pts: 0, dg: 0, pj: 0 });
    } else {
        let r = pool.filter(j => j.p !== 'drive'); let d = pool.filter(j => j.p === 'drive');
        r.sort((a,b)=>b.l-a.l); d.sort((a,b)=>a.l-b.l);
        while(r.length && d.length) {
            let p1=r.shift(); let p2=d.shift();
            state.parejas.push({ nombres: `${p1.n} (R) / ${p2.n} (D)`, pts: 0, dg: 0, pj: 0 });
        }
    }
    state.enProgreso = true; guardarEnDisco();
    renderPantallaJuego(); mostrarPartidos();
}

function renderPantallaJuego() {
    document.getElementById('pantalla-dinamica').innerHTML = `
        <div class="flex gap-2 mb-4">
            <button id="btn-crono" onclick="iniciarConCrono()" class="btn-play">▶ Iniciar con Crono</button>
            <button id="btn-fast" onclick="iniciarSinCrono()" class="btn-fast">⚡ Iniciar sin Crono</button>
        </div>
        <div class="card bg-slate-900/60 mb-4"><div id="tabla-puntos"></div></div>
        <div id="partidos-cont" class="space-y-4"></div>
        <div id="zona-controles"></div>
    `;
}

function mostrarPartidos() {
    state.resultados = 0; state.cronosActivos = false;
    document.getElementById('fase-info').innerText = `Ronda ${state.ronda}/3`;
    const rondas = [[[0,5], [1,4], [2,3]],[[0,3], [5,1], [4,2]],[[0,1], [3,4], [5,2]]];
    const actual = rondas[state.ronda-1];
    const cont = document.getElementById('partidos-cont');
    cont.innerHTML = "";
    actual.forEach((pIds, i) => {
        let pA = state.parejas[pIds[0]]; let pB = state.parejas[pIds[1]];
        cont.innerHTML += `
            <div class="card border-l-4 border-green-500 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <span class="pista-tag">PISTA ${state.pistasReales[i]}</span>
                    <span id="t-${i}" class="text-yellow-400 font-mono text-lg font-bold">${state.tiempoRonda}:00</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex-1 text-[11px] font-bold leading-tight">${pA.nombres}</div>
                    <select id="m-${i}-0" class="w-14 bg-slate-800 border-none font-bold text-lg h-10 disabled:opacity-30" disabled>
                        ${Array.from({length:16},(_,v)=>`<option value="${v}">${v}</option>`).join('')}
                    </select>
                    <div class="text-slate-500 font-black italic">VS</div>
                    <select id="m-${i}-1" class="w-14 bg-slate-800 border-none font-bold text-lg h-10 disabled:opacity-30" disabled>
                        ${Array.from({length:16},(_,v)=>`<option value="${v}">${v}</option>`).join('')}
                    </select>
                    <div class="flex-1 text-[11px] font-bold text-right leading-tight">${pB.nombres}</div>
                </div>
                <button onclick="confirmarPista(${i})" id="b-save-${i}" class="hidden w-full mt-3 py-2 bg-orange-600 rounded text-xs font-bold uppercase">Confirmar Resultado</button>
            </div>`;
    });
    refrescarTabla();
}

function iniciarConCrono() {
    if(state.cronosActivos) return;
    state.cronosActivos = true; ejecutarBocina();
    document.getElementById('btn-fast').classList.add('hidden');
    document.getElementById('btn-crono').innerText = "⌛ JUGANDO...";
    let t = state.tiempoRonda * 60;
    const interval = setInterval(() => {
        t--;
        if(t <= 0) { 
            clearInterval(interval); ejecutarBocina(); 
            desbloquearMarcadores();
        }
        for(let i=0; i<3; i++) document.getElementById(`t-${i}`).innerText = `${Math.floor(t/60)}:${(t%60)<10?'0':''}${t%60}`;
    }, 1000);
}

function iniciarSinCrono() {
    ejecutarBocina();
    desbloquearMarcadores();
    document.getElementById('btn-crono').classList.add('hidden');
    document.getElementById('btn-fast').innerText = "⚡ MARCADORES ACTIVOS";
}

function desbloquearMarcadores() {
    for(let i=0; i<3; i++) {
        document.getElementById(`m-${i}-0`).disabled = false;
        document.getElementById(`m-${i}-1`).disabled = false;
        document.getElementById(`b-save-${i}`).classList.remove('hidden');
        document.getElementById(`t-${i}`).innerText = "FIN";
    }
}

function confirmarPista(idx) {
    const rondas = [[[0,5], [1,4], [2,3]],[[0,3], [5,1], [4,2]],[[0,1], [3,4], [5,2]]];
    const pIds = rondas[state.ronda-1][idx];
    const m0 = parseInt(document.getElementById(`m-${idx}-0`).value);
    const m1 = parseInt(document.getElementById(`m-${idx}-1`).value);
    const p0 = state.parejas[pIds[0]]; const p1 = state.parejas[pIds[1]];
    if(m0 > m1) p0.pts += 3; else if(m1 > m0) p1.pts += 3; else { p0.pts += 1; p1.pts += 1; }
    p0.dg += (m0-m1); p1.dg += (m1-m0); p0.pj++; p1.pj++;
    document.getElementById(`b-save-${idx}`).classList.add('hidden');
    state.resultados++; refrescarTabla(); guardarEnDisco();
    if(state.resultados === 3) {
        const zona = document.getElementById('zona-controles');
        if(state.ronda < 3) { zona.innerHTML = `<button onclick="proximaRonda()" class="btn-green bg-blue-600 mt-4 uppercase">Siguiente Ronda</button>`; }
        else { zona.innerHTML = `<button onclick="hacerSemis()" class="btn-green bg-purple-600 mt-4 uppercase">Ir a Semifinales</button>`; }
    }
}

function proximaRonda() { state.ronda++; document.getElementById('zona-controles').innerHTML = ""; renderPantallaJuego(); mostrarPartidos(); guardarEnDisco(); }

function refrescarTabla() {
    state.parejas.sort((a,b) => b.pts - a.pts || b.dg - a.dg);
    let h = `<table class="w-full text-[9px]"><tr><th class="text-left">PAREJA</th><th class="text-center">PTS</th><th class="text-center">DG</th></tr>`;
    state.parejas.forEach((p, i) => { h += `<tr class="${i<4?'text-green-400 font-bold':'text-slate-400'} border-b border-slate-800/50"><td>${p.nombres}</td><td class="text-center">${p.pts}</td><td class="text-center">${p.dg}</td></tr>`; });
    document.getElementById('tabla-puntos').innerHTML = h + `</table>`;
}

function hacerSemis() {
    document.getElementById('fase-info').innerText = "SEMIFINALES";
    const cont = document.getElementById('partidos-cont');
    cont.innerHTML = "";
    [ [state.parejas[0], state.parejas[3]], [state.parejas[1], state.parejas[2]] ].forEach((p, i) => {
        cont.innerHTML += `<div class="card border-l-4 border-purple-500"><div class="flex justify-between items-center mb-2"><span class="pista-tag !bg-purple-600">PISTA ${state.pistasReales[i]}</span><span id="ts-${i}" class="text-yellow-400 font-mono font-bold">25:00</span></div><div class="flex items-center gap-2 font-bold text-[10px]"><div class="flex-1">${p[0].nombres}</div><div>vs</div><div class="flex-1 text-right">${p[1].nombres}</div></div><button onclick="startS(${i})" id="bs-${i}" class="w-full mt-3 py-1.5 bg-purple-600 rounded text-[10px] font-bold uppercase">Iniciar Semifinal</button></div>`;
    });
}

function startS(idx) {
    let t = 25 * 60; const btn = document.getElementById(`bs-${idx}`); btn.disabled = true; ejecutarBocina();
    const timer = setInterval(() => {
        t--; document.getElementById(`ts-${idx}`).innerText = `${Math.floor(t/60)}:${(t%60)<10?'0':''}${t%60}`;
        if(t <= 0) { clearInterval(timer); ejecutarBocina(); }
    }, 1000);
}

function ejecutarBocina() {
    try { const ctx = new AudioContext(); const o = ctx.createOscillator(); o.type='square'; o.frequency.value=200; o.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 1.2); } catch(e){}
}
</script>
</body>
</html>
