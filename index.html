<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tornea Pro V8.5</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; border: 1px solid #334155; }
        .btn-green { background: #22c55e; color: white; font-weight: bold; padding: 1rem; border-radius: 10px; width: 100%; border: none; cursor: pointer; display: block; text-align: center; }
        .btn-green:active { background: #16a34a; transform: scale(0.98); }
        input, select { background: #0f172a; border: 1px solid #444; padding: 0.5rem; border-radius: 6px; color: white; width: 100%; text-align: center; font-size: 14px; }
        .badge { background: #334155; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .pista-tag { background: #d97706; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .select-mini { font-size: 11px; height: 32px; padding: 0 4px; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto p-4 pb-20">
    <header class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black text-green-500 italic uppercase">Tornea Pro V8.5</h1>
        <div id="fase-info" class="badge text-yellow-400">Inicio</div>
    </header>

    <div id="pantalla-dinamica">
        <div id="step-1">
            <div class="card">
                <h2 class="text-[10px] font-bold mb-4 uppercase text-slate-500 text-center tracking-widest">Ajustes del Mini</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 uppercase text-center">Tiempo Total (Minutos)</label>
                        <input type="number" id="cfg-tiempo" value="150">
                    </div>
                    
                    <div class="border-t border-slate-700 pt-4">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-[10px] text-slate-400 uppercase">Pistas</label>
                            <select id="pistas-tipo" onchange="cambiarVistaPistas()" class="bg-slate-800 text-[10px] p-1 rounded border-none w-auto">
                                <option value="corr">Correlativas (1,2,3)</option>
                                <option value="manu">Manuales</option>
                            </select>
                        </div>
                        
                        <div id="area-pistas-manuales" style="display: none;" class="grid grid-cols-3 gap-2">
                            <input type="number" id="p-val-1" value="1">
                            <input type="number" id="p-val-2" value="2">
                            <input type="number" id="p-val-3" value="3">
                        </div>
                        <p id="area-pistas-auto" class="text-[10px] text-green-500 italic text-center py-2">Se usarán pistas 1, 2 y 3 automáticamente.</p>
                    </div>
                </div>
            </div>
            <button onclick="logicaSiguiente()" class="btn-green shadow-lg">SIGUIENTE</button>
        </div>
    </div>
</div>

<script>
let state = { 
    parejas: [], 
    ronda: 1, 
    resultados: 0, 
    pistasReales: [1, 2, 3],
    tiempoTotal: 150 
};

function cambiarVistaPistas() {
    const selector = document.getElementById('pistas-tipo').value;
    const divManual = document.getElementById('area-pistas-manuales');
    const msgAuto = document.getElementById('area-pistas-auto');
    divManual.style.display = (selector === 'manu') ? 'grid' : 'none';
    msgAuto.style.display = (selector === 'manu') ? 'none' : 'block';
}

function logicaSiguiente() {
    state.tiempoTotal = document.getElementById('cfg-tiempo').value || 150;
    const selector = document.getElementById('pistas-tipo').value;
    state.pistasReales = (selector === 'manu') ? 
        [document.getElementById('p-val-1').value || 1, document.getElementById('p-val-2').value || 2, document.getElementById('p-val-3').value || 3] : 
        [1, 2, 3];

    document.getElementById('fase-info').innerText = "Jugadores";
    let html = `
        <h2 class="text-[10px] font-bold mb-3 uppercase text-slate-500 text-center tracking-widest">Nombres, Posición y Nivel</h2>
        <div id="lista-jugadores" class="grid grid-cols-1 gap-2 mb-4 h-[60vh] overflow-y-auto pr-1">`;
    
    for(let i=0; i<12; i++) {
        // Lógica de alternancia: Si es impar (0, 2, 4...) -> Revés. Si es par (1, 3, 5...) -> Drive.
        const posDefecto = (i % 2 === 0) ? "reves" : "drive";
        
        html += `
            <div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700/50">
                <div class="flex gap-2 items-center mb-2">
                    <span class="text-[10px] text-slate-500 font-bold w-4">${i+1}</span>
                    <input type="text" placeholder="Jugador" class="p-name !text-left !px-3 h-9">
                </div>
                <div class="flex gap-2">
                    <select class="p-pos bg-slate-700 select-mini">
                        <option value="reves" ${posDefecto === 'reves' ? 'selected' : ''}>Revés</option>
                        <option value="drive" ${posDefecto === 'drive' ? 'selected' : ''}>Drive</option>
                        <option value="poli">Polivalente</option>
                    </select>
                    <select class="p-lvl bg-slate-700 select-mini">
                        <option value="25">Nivel 25</option>
                        <option value="50" selected>Nivel 50</option>
                        <option value="75">Nivel 75</option>
                    </select>
                </div>
            </div>`;
    }

    html += `</div><button onclick="finalizarConfig()" class="btn-green uppercase">Empezar Torneo</button>`;
    document.getElementById('pantalla-dinamica').innerHTML = html;
}

function finalizarConfig() {
    const names = document.querySelectorAll('.p-name');
    const lvls = document.querySelectorAll('.p-lvl');
    const poss = document.querySelectorAll('.p-pos');
    let personas = [];
    
    names.forEach((n,i) => {
        personas.push({
            n: n.value || `J${i+1}`, 
            l: parseInt(lvls[i].value),
            p: poss[i].value
        });
    });
    
    // Emparejamiento por nivel (simplificado)
    personas.sort((a,b) => b.l - a.l);
    state.parejas = [];
    while(personas.length > 0) {
        let p1 = personas.shift();
        let p2 = personas.pop();
        state.parejas.push({ 
            id: state.parejas.length, 
            nombres: `${p1.n} (${p1.p}) / ${p2.n} (${p2.p})`, 
            pts: 0, dg: 0, pj: 0 
        });
    }

    renderPantallaJuego();
    mostrarPartidos();
}

function renderPantallaJuego() {
    document.getElementById('pantalla-dinamica').innerHTML = `
        <div class="card bg-slate-900/60 mb-2"><div id="tabla-puntos"></div></div>
        <div id="partidos-cont" class="space-y-3"></div>
        <div id="zona-controles"></div>
    `;
}

function mostrarPartidos() {
    state.resultados = 0;
    document.getElementById('fase-info').innerText = `Ronda ${state.ronda}/3`;
    const rondas = [[[0,5], [1,4], [2,3]],[[0,3], [5,1], [4,2]],[[0,1], [3,4], [5,2]]];
    const actual = rondas[state.ronda-1];
    const cont = document.getElementById('partidos-cont');
    cont.innerHTML = "";
    
    actual.forEach((pIds, i) => {
        cont.innerHTML += `
            <div class="card border-l-4 border-green-500">
                <div class="flex justify-between items-center mb-2 font-black uppercase">
                    <span class="pista-tag">PISTA ${state.pistasReales[i]}</span>
                    <span id="t-${i}" class="text-yellow-400 font-mono text-sm">20:00</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-1 text-[10px] font-bold leading-tight">${state.parejas[pIds[0]].nombres}</div>
                    <input type="number" id="m-${i}-0" class="w-10 bg-slate-800 border-none rounded py-1" value="0">
                    <div class="text-[9px] text-slate-500 italic">vs</div>
                    <input type="number" id="m-${i}-1" class="w-10 bg-slate-800 border-none rounded py-1" value="0">
                    <div class="flex-1 text-[10px] font-bold text-right leading-tight">${state.parejas[pIds[1]].nombres}</div>
                </div>
                <button onclick="startT(${i})" id="b-${i}" class="w-full mt-3 py-1.5 bg-blue-600 rounded text-[10px] font-bold uppercase tracking-wider">Iniciar Partido</button>
            </div>`;
    });
    refrescarTabla();
}

function startT(idx) {
    let t = 20 * 60;
    const btn = document.getElementById(`b-${idx}`);
    btn.disabled = true; btn.innerText = "JUGANDO...";
    const interval = setInterval(() => {
        t--;
        let m = Math.floor(t/60); let s = t%60;
        document.getElementById(`t-${idx}`).innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if(t <= 0) {
            clearInterval(interval);
            btn.disabled = false; btn.innerText = "CONFIRMAR RESULTADO"; 
            btn.classList.replace('bg-blue-600', 'bg-orange-600');
            btn.onclick = () => guardarR(idx);
            try { 
                const ctx = new AudioContext(); 
                const o = ctx.createOscillator(); 
                o.connect(ctx.destination); 
                o.start(); o.stop(ctx.currentTime + 1); 
            } catch(e){}
        }
    }, 1000);
}

function guardarR(idx) {
    const rondas = [[[0,5], [1,4], [2,3]],[[0,3], [5,1], [4,2]],[[0,1], [3,4], [5,2]]];
    const pIds = rondas[state.ronda-1][idx];
    const m0 = parseInt(document.getElementById(`m-${idx}-0`).value) || 0;
    const m1 = parseInt(document.getElementById(`m-${idx}-1`).value) || 0;
    
    const p0 = state.parejas[pIds[0]]; const p1 = state.parejas[pIds[1]];
    if(m0 > m1) p0.pts += 3; else if(m1 > m0) p1.pts += 3; else { p0.pts += 1; p1.pts += 1; }
    p0.dg += (m0-m1); p1.dg += (m1-m0); p0.pj++; p1.pj++;
    
    document.getElementById(`b-${idx}`).disabled = true;
    document.getElementById(`b-${idx}`).innerText = "✓ GUARDADO";
    document.getElementById(`b-${idx}`).className = "w-full mt-3 py-1.5 bg-slate-700 rounded text-[10px] text-slate-500 font-bold";
    
    state.resultados++;
    refrescarTabla();

    if(state.resultados === 3) {
        const zona = document.getElementById('zona-controles');
        if(state.ronda < 3) {
            zona.innerHTML = `<button onclick="proximaRonda()" class="btn-green bg-blue-600 mt-4 uppercase italic">Siguiente Ronda</button>`;
        } else {
            zona.innerHTML = `<button onclick="hacerSemis()" class="btn-green bg-purple-600 mt-4 uppercase italic">Ir a Semifinales</button>`;
        }
    }
}

function proximaRonda() { state.ronda++; mostrarPartidos(); document.getElementById('zona-controles').innerHTML = ""; }

function refrescarTabla() {
    state.parejas.sort((a,b) => b.pts - a.pts || b.dg - a.dg);
    let h = `<table class="w-full text-[9px]"><tr><th class="text-left">PAREJA</th><th class="text-center">PTS</th><th class="text-center">DG</th></tr>`;
    state.parejas.forEach((p, i) => {
        let hl = i < 4 ? 'text-green-400 font-bold' : 'text-slate-400';
        h += `<tr class="${hl} border-b border-slate-800/50"><td>${p.nombres}</td><td class="text-center">${p.pts}</td><td class="text-center">${p.dg}</td></tr>`;
    });
    document.getElementById('tabla-puntos').innerHTML = h + `</table>`;
}

function hacerSemis() {
    document.getElementById('fase-info').innerText = "SEMIFINALES";
    document.getElementById('zona-controles').innerHTML = "";
    const cont = document.getElementById('partidos-cont');
    cont.innerHTML = `<p class="text-center text-[10px] text-purple-400 mb-3 font-black uppercase italic tracking-widest">Cruces: 1º vs 4º | 2º vs 3º</p>`;
    
    [ [state.parejas[0], state.parejas[3]], [state.parejas[1], state.parejas[2]] ].forEach((p, i) => {
        cont.innerHTML += `
            <div class="card border-l-4 border-purple-500">
                <div class="flex justify-between items-center mb-2 font-bold uppercase">
                    <span class="pista-tag !bg-purple-600">PISTA ${state.pistasReales[i]}</span>
                    <span id="ts-${i}" class="text-yellow-400 text-sm font-mono">25:00</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-1 text-[10px] font-bold leading-tight">${p[0].nombres}</div>
                    <div class="text-[9px] text-slate-500 italic">vs</div>
                    <div class="flex-1 text-[10px] font-bold text-right leading-tight">${p[1].nombres}</div>
                </div>
                <button onclick="startS(${i})" id="bs-${i}" class="w-full mt-3 py-1.5 bg-purple-600 rounded text-[10px] font-bold uppercase tracking-wider text-white">Iniciar Semifinal</button>
            </div>`;
    });
}

function startS(idx) {
    let t = 25 * 60;
    const btn = document.getElementById(`bs-${idx}`);
    btn.disabled = true;
    const timer = setInterval(() => {
        t--;
        let m = Math.floor(t/60); let s = t%60;
        document.getElementById(`ts-${idx}`).innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if(t <= 0) { clearInterval(timer); btn.innerText = "FINALIZADO"; }
    }, 1000);
}
</script>
</body>
</html>
