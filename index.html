<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tornea V8.1 - Fixed</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; border: 1px solid #334155; }
        .btn-green { background: #22c55e; color: white; font-weight: bold; padding: 0.8rem; border-radius: 10px; width: 100%; cursor: pointer; }
        .btn-green:active { background: #16a34a; transform: scale(0.98); }
        input { background: #0f172a; border: 1px solid #444; padding: 0.4rem; border-radius: 6px; color: white; width: 100%; text-align: center; font-size: 14px; }
        .badge { background: #334155; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .pista-tag { background: #d97706; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .checkbox-custom { width: 20px; height: 20px; accent-color: #22c55e; cursor: pointer; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto p-4 pb-20">
    <header class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black text-green-500 italic uppercase">Tornea Pro V8.1</h1>
        <div id="fase-info" class="badge text-yellow-400">Configuración</div>
    </header>

    <div id="step-1">
        <div class="card">
            <h2 class="text-[10px] font-bold mb-4 uppercase text-slate-500 tracking-widest">Ajustes del Torneo</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-400 block mb-1 uppercase text-center">Tiempo Total (Minutos)</label>
                    <input type="number" id="cfg-tiempo" value="150">
                </div>
                
                <div class="border-t border-slate-700 pt-4">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-[10px] text-slate-400 uppercase">Pistas</label>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-slate-300">Correlativas (1,2,3)</span>
                            <input type="checkbox" id="pistas-correlativas" checked onchange="togglePistas()" class="checkbox-custom">
                        </div>
                    </div>
                    
                    <div id="pistas-manuales" class="grid grid-cols-3 gap-2 hidden">
                        <input type="number" id="p-val-1" placeholder="Nº" value="1">
                        <input type="number" id="p-val-2" placeholder="Nº" value="2">
                        <input type="number" id="p-val-3" placeholder="Nº" value="3">
                    </div>
                    <p id="pistas-auto-msg" class="text-[10px] text-green-500 italic text-center">Se usarán las pistas 1, 2 y 3.</p>
                </div>
            </div>
        </div>
        <button type="button" onclick="irAPaso2()" class="btn-green shadow-lg shadow-green-900/40">SIGUIENTE</button>
    </div>

    <div id="step-2" class="hidden">
        <h2 class="text-[10px] font-bold mb-3 uppercase text-slate-500 tracking-widest text-center">Nombres (12 Personas)</h2>
        <div id="lista-jugadores" class="grid grid-cols-1 gap-2 mb-4 h-[60vh] overflow-y-auto pr-1"></div>
        <button type="button" onclick="iniciarTodo()" class="btn-green shadow-lg shadow-green-900/20 uppercase">Empezar Torneo</button>
    </div>

    <div id="step-3" class="hidden">
        <div class="card bg-slate-900/60 mb-2">
            <div id="tabla-puntos" class="text-[11px]"></div>
        </div>
        <div id="partidos-cont" class="space-y-3 text-center">
            </div>
        <button id="btn-next" onclick="siguienteRonda()" class="btn-green bg-blue-600 mt-4 hidden uppercase">Siguiente Ronda</button>
        <button id="btn-finales" onclick="generarSemis()" class="btn-green bg-purple-600 mt-4 hidden uppercase">Ir a Semifinales</button>
    </div>
</div>

<script>
let state = { parejas: [], ronda: 1, resultados: 0, pistasReales: [1, 2, 3] };

function togglePistas() {
    const isChecked = document.getElementById('pistas-correlativas').checked;
    const manualDiv = document.getElementById('pistas-manuales');
    const msgDiv = document.getElementById('pistas-auto-msg');
    
    if (isChecked) {
        manualDiv.classList.add('hidden');
        msgDiv.classList.remove('hidden');
    } else {
        manualDiv.classList.remove('hidden');
        msgDiv.classList.add('hidden');
    }
}

function irAPaso2() {
    const isCorrelativas = document.getElementById('pistas-correlativas').checked;
    
    if (isCorrelativas) {
        state.pistasReales = [1, 2, 3];
    } else {
        // Recogemos valores y si están vacíos ponemos 1, 2, 3 por defecto
        state.pistasReales = [
            document.getElementById('p-val-1').value || 1,
            document.getElementById('p-val-2').value || 2,
            document.getElementById('p-val-3').value || 3
        ];
    }

    // Cambiar de pantalla
    document.getElementById('step-1').classList.add('hidden');
    document.getElementById('step-2').classList.remove('hidden');
    
    // Generar inputs (6 parejas = 12 personas)
    const contJug = document.getElementById('lista-jugadores');
    contJug.innerHTML = "";
    for(let i=0; i<12; i++) {
        contJug.innerHTML += `
            <div class="flex gap-2 items-center bg-slate-800/40 p-2 rounded-lg">
                <span class="text-[10px] text-slate-600 w-4">${i+1}</span>
                <input type="text" placeholder="Jugador" class="p-name">
                <select class="p-lvl bg-slate-700 text-[10px] rounded px-1 h-8">
                    <option value="25">25</option><option value="50" selected>50</option><option value="75">75</option>
                </select>
            </div>`;
    }
}

function iniciarTodo() {
    const names = document.querySelectorAll('.p-name');
    const lvls = document.querySelectorAll('.p-lvl');
    let personas = [];
    names.forEach((n,i) => personas.push({n: n.value || `J${i+1}`, l: parseInt(lvls[i].value)}));
    
    // Emparejamiento
    personas.sort((a,b) => b.l - a.l);
    state.parejas = [];
    while(personas.length > 0) {
        let p1 = personas.shift(); let p2 = personas.pop();
        state.parejas.push({ id: state.parejas.length, nombres: `${p1.n} / ${p2.n}`, pts: 0, dg: 0, pj: 0 });
    }

    document.getElementById('step-2').classList.add('hidden');
    document.getElementById('step-3').classList.remove('hidden');
    prepararRonda();
}

function prepararRonda() {
    state.resultados = 0;
    document.getElementById('btn-next').classList.add('hidden');
    document.getElementById('fase-info').innerText = `Ronda ${state.ronda}/3`;
    
    const calendarios = [
        [[0,5], [1,4], [2,3]],
        [[0,3], [5,1], [4,2]],
        [[0,1], [3,4], [5,2]]
    ];
    
    const actual = calendarios[state.ronda-1];
    const cont = document.getElementById('partidos-cont');
    cont.innerHTML = "";
    
    actual.forEach((pIds, i) => {
        cont.innerHTML += `
            <div class="card border-l-4 border-green-500 text-left">
                <div class="flex justify-between items-center mb-2">
                    <span class="pista-tag">PISTA ${state.pistasReales[i]}</span>
                    <span id="t-${i}" class="text-yellow-400 font-mono text-sm">20:00</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-1 text-[11px] font-bold leading-tight">${state.parejas[pIds[0]].nombres}</div>
                    <input type="number" id="m-${i}-0" class="w-10 bg-slate-800 border-none rounded py-1" value="0">
                    <div class="text-[9px] text-slate-500">vs</div>
                    <input type="number" id="m-${i}-1" class="w-10 bg-slate-800 border-none rounded py-1" value="0">
                    <div class="flex-1 text-[11px] font-bold text-right leading-tight">${state.parejas[pIds[1]].nombres}</div>
                </div>
                <button onclick="startT(${i})" id="b-${i}" class="w-full mt-3 py-1.5 bg-blue-600 rounded text-[10px] font-bold uppercase tracking-wider">Iniciar Partido</button>
            </div>`;
    });
    actualizarTabla();
}

function startT(idx) {
    let t = 20 * 60;
    const btn = document.getElementById(`b-${idx}`);
    btn.disabled = true; btn.innerText = "CRONÓMETRO...";
    const timer = setInterval(() => {
        t--;
        let m = Math.floor(t/60); let s = t%60;
        document.getElementById(`t-${idx}`).innerText = `${m}:${s<10?'0':''}${s}`;
        if(t<=0) {
            clearInterval(timer);
            btn.disabled = false; btn.innerText = "CONFIRMAR RESULTADO"; 
            btn.classList.replace('bg-blue-600', 'bg-orange-600');
            btn.onclick = () => save(idx);
            ejecutarBocina();
        }
    }, 1000);
}

function save(idx) {
    const calendarios = [[[0,5], [1,4], [2,3]],[[0,3], [5,1], [4,2]],[[0,1], [3,4], [5,2]]];
    const pIds = calendarios[state.ronda-1][idx];
    const m0 = parseInt(document.getElementById(`m-${idx}-0`).value);
    const m1 = parseInt(document.getElementById(`m-${idx}-1`).value);
    
    const p0 = state.parejas[pIds[0]]; const p1 = state.parejas[pIds[1]];
    if(m0 > m1) p0.pts += 3; else if(m1 > m0) p1.pts += 3; else { p0.pts += 1; p1.pts += 1; }
    p0.dg += (m0-m1); p1.dg += (m1-m0); p0.pj++; p1.pj++;
    
    document.getElementById(`b-${idx}`).disabled = true;
    document.getElementById(`b-${idx}`).innerText = "✓ GUARDADO";
    document.getElementById(`b-${idx}`).className = "w-full mt-3 py-1.5 bg-slate-700 rounded text-[10px] text-slate-500 font-bold";
    
    state.resultados++;
    actualizarTabla();
    if(state.resultados === 3) {
        if(state.ronda < 3) document.getElementById('btn-next').classList.remove('hidden');
        else document.getElementById('btn-finales').classList.remove('hidden');
    }
}

function siguienteRonda() { state.ronda++; prepararRonda(); }

function actualizarTabla() {
    state.parejas.sort((a,b) => b.pts - a.pts || b.dg - a.dg);
    let h = `<table><tr><th>PAREJA</th><th>PTS</th><th>DG</th><th>PJ</th></tr>`;
    state.parejas.forEach((p, i) => {
        let highlight = i < 4 ? 'text-green-400 font-bold' : 'text-slate-400';
        h += `<tr class="${highlight}"><td>${p.nombres}</td><td>${p.pts}</td><td>${p.dg}</td><td>${p.pj}</td></tr>`;
    });
    document.getElementById('tabla-puntos').innerHTML = h + `</table>`;
}

function generarSemis() {
    document.getElementById('fase-info').innerText = "SEMIFINALES (25 min)";
    document.getElementById('btn-finales').classList.add('hidden');
    const cont = document.getElementById('partidos-cont');
    cont.innerHTML = `<p class="text-center text-[10px] text-purple-400 mb-3 font-black uppercase tracking-widest italic text-center">Cruces: 1º vs 4º | 2º vs 3º</p>`;
    
    [ [state.parejas[0], state.parejas[3]], [state.parejas[1], state.parejas[2]] ].forEach((p, i) => {
        cont.innerHTML += `
            <div class="card border-l-4 border-purple-500 text-left">
                <div class="flex justify-between items-center mb-2 font-bold uppercase">
                    <span class="pista-tag !bg-purple-600">PISTA ${state.pistasReales[i]}</span>
                    <span id="ts-${i}" class="text-yellow-400 text-sm font-mono">25:00</span>
                </div>
