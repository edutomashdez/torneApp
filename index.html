<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tornea Pro V12 - Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 14px; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #334155; }
        .btn-green { background: #22c55e; color: white; font-weight: bold; padding: 1rem; border-radius: 10px; width: 100%; border: none; cursor: pointer; display: block; text-align: center; }
        .btn-play { background: #3b82f6; color: white; font-weight: 800; padding: 0.6rem; border-radius: 10px; flex: 1; text-transform: uppercase; font-size: 10px; }
        .btn-fast { background: #6366f1; color: white; font-weight: 800; padding: 0.6rem; border-radius: 10px; flex: 1; text-transform: uppercase; font-size: 10px; }
        input, select { background: #0f172a; border: 1px solid #444; padding: 0.5rem; border-radius: 6px; color: white; width: 100%; text-align: center; font-size: 16px; }
        .pista-tag { background: #d97706; color: white; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }
        .final-tag { background: #be185d; color: white; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }
        .toggle-34 { display: flex; align-items: center; justify-content: center; gap: 10px; background: #334155; padding: 10px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto p-4 pb-20">
    <header class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black text-green-500 italic uppercase">Tornea Pro V12</h1>
        <div id="fase-info" class="badge bg-slate-800 px-2 py-1 rounded text-[10px] text-yellow-400 font-bold">Inicio</div>
    </header>

    <div id="pantalla-dinamica">
        <div id="area-recuperacion"></div>
        <div id="step-1">
            <div class="card">
                <h2 class="text-[10px] font-bold mb-4 uppercase text-slate-500 text-center tracking-widest">Ajustes del Torneo</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 uppercase text-center">Tiempo Ronda (Min)</label>
                        <input type="number" id="cfg-tiempo" value="20">
                    </div>
                    <div class="border-t border-slate-700 pt-4">
                        <select id="pistas-tipo" onchange="cambiarVistaPistas()" class="text-xs mb-3">
                            <option value="corr">Pistas 1, 2, 3</option>
                            <option value="manu">Pistas Manuales</option>
                        </select>
                        <div id="area-pistas-manuales" style="display: none;" class="grid grid-cols-3 gap-2">
                            <input type="number" id="p-val-1" value="1"> <input type="number" id="p-val-2" value="2"> <input type="number" id="p-val-3" value="3">
                        </div>
                    </div>
                    <div class="toggle-34">
                        <span class="text-[10px] uppercase font-bold text-slate-300">¿Tercer y Cuarto Puesto?</span>
                        <input type="checkbox" id="cfg-34" style="width: 20px; height: 20px;" checked>
                    </div>
                </div>
            </div>
            <button onclick="logicaSiguiente()" class="btn-green">CONFIGURAR JUGADORES</button>
        </div>
    </div>
</div>

<script>
let state = { 
    parejas: [], ronda: 1, resultados: 0, pistasReales: [1, 2, 3], 
    tiempoRonda: 20, con34: true, enProgreso: false, modificado: false 
};

function guardarEnDisco() { localStorage.setItem('tornea_v12_backup', JSON.stringify(state)); }

window.onload = function() {
    const backup = localStorage.getItem('tornea_v12_backup');
    if (backup) {
        const saved = JSON.parse(backup);
        if (saved.enProgreso) {
            document.getElementById('area-recuperacion').innerHTML = `<div class="bg-orange-600 p-3 rounded-lg mb-4 text-center"><p class="text-xs font-bold mb-2">Hay un torneo activo</p><button onclick="restaurarTorneo()" class="bg-white text-orange-600 px-4 py-1 rounded text-[10px] font-bold mr-2">REANUDAR</button><button onclick="borrarCache()" class="bg-black text-white px-4 py-1 rounded text-[10px]">BORRAR</button></div>`;
        }
    }
};

function restaurarTorneo() {
    state = JSON.parse(localStorage.getItem('tornea_v12_backup'));
    document.getElementById('area-recuperacion').innerHTML = "";
    if(state.ronda > 3) { hacerFaseFinal(); } else { renderPantallaJuego(); mostrarPartidos(); }
}

function borrarCache() { localStorage.removeItem('tornea_v12_backup'); location.reload(); }
function cambiarVistaPistas() { document.getElementById('area-pistas-manuales').style.display = (document.getElementById('pistas-tipo').value === 'manu') ? 'grid' : 'none'; }

function logicaSiguiente() {
    state.tiempoRonda = document.getElementById('cfg-tiempo').value || 20;
    state.con34 = document.getElementById('cfg-34').checked;
    state.pistasReales = (document.getElementById('pistas-tipo').value === 'manu') ? [document.getElementById('p-val-1').value||1, document.getElementById('p-val-2').value||2, document.getElementById('p-val-3').value||3] : [1,2,3];
    
    let html = `<div id="lista-jugadores" class="grid grid-cols-1 gap-2 mb-4 h-[65vh] overflow-y-auto">`;
    for(let i=0; i<12; i++) {
        html += `<div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700/50"><div class="flex gap-2 mb-2"><span class="text-[10px] text-slate-500 font-bold">${i+1}</span><input type="text" placeholder="Nombre" class="p-name !text-left h-8 text-sm"></div><div class="flex gap-2"><select class="p-pos bg-slate-700 h-7 text-[10px]" onchange="state.modificado=true"><option value="reves">Revés</option><option value="drive" ${i%2!==0?'selected':''}>Drive</option><option value="poli">Poli</option></select><select class="p-lvl bg-slate-700 h-7 text-[10px]" onchange="state.modificado=true"><option value="25">Nivel 25</option><option value="50" selected>Nivel 50</option><option value="75">Nivel 75</option></select></div></div>`;
    }
    html += `</div><button onclick="finalizarConfig()" class="btn-green">INICIAR TORNEO</button>`;
    document.getElementById('pantalla-dinamica').innerHTML = html;
}

function finalizarConfig() {
    const names = document.querySelectorAll('.p-name');
    const lvls = document.querySelectorAll('.p-lvl');
    const poss = document.querySelectorAll('.p-pos');
    let pool = [];
    names.forEach((n, i) => pool.push({n: n.value || `J${i+1}`, l: parseInt(lvls[i].value), p: poss[i].value }));
    state.parejas = [];
    if (!state.modificado) { for (let i = 0; i < pool.length; i += 2) state.parejas.push({ nombres: `${pool[i].n} / ${pool[i+1].n}`, pts: 0, dg: 0, pj: 0 }); }
    else {
        let r = pool.filter(j => j.p !== 'drive'); let d = pool.filter(j => j.p === 'drive');
        r.sort((a,b)=>b.l-a.l); d.sort((a,b)=>a.l-b.l);
        while(r.length && d.length) { let p1=r.shift(); let p2=d.shift(); state.parejas.push({ nombres: `${p1.n} / ${p2.n}`, pts: 0, dg: 0, pj: 0 }); }
    }
    state.enProgreso = true; guardarEnDisco(); renderPantallaJuego(); mostrarPartidos();
}

function renderPantallaJuego() {
    document.getElementById('pantalla-dinamica').innerHTML = `<div id="controles-master" class="flex gap-2 mb-4"><button id="m-crono" onclick="iniciarCronoMaster()" class="btn-play">▶ Crono Ronda</button><button id="m-fast" onclick="desbloquearTodo()" class="btn-fast">⚡ Desbloquear</button></div><div class="card bg-slate-900/60 mb-4" id="tabla-puntos"></div><div id="partidos-cont" class="space-y-4"></div><div id="zona-controles"></div>`;
}

function mostrarPartidos() {
    state.resultados = 0; document.getElementById('fase-info').innerText = `Ronda ${state.ronda}/3`;
    const rondas = [[[0,5], [1,4], [2,3]],[[0,3], [5,1], [4,2]],[[0,1], [3,4], [5,2]]];
    const actual = rondas[state.ronda-1];
    const cont = document.getElementById('partidos-cont'); cont.innerHTML = "";
    actual.forEach((pIds, i) => {
        cont.innerHTML += generarTarjetaPartido(i, state.parejas[pIds[0]], state.parejas[pIds[1]], state.pistasReales[i], state.tiempoRonda);
    });
    refrescarTabla();
}

function generarTarjetaPartido(id, p1, p2, pista, tiempo, esFinal = false) {
    return `
    <div class="card border-l-4 ${esFinal?'border-pink-600':'border-green-500'}">
        <div class="flex justify-between items-center mb-3">
            <span class="${esFinal?'final-tag':'pista-tag'}">PISTA ${pista}</span>
            <span id="t-${id}" class="text-yellow-400 font-mono font-bold">${tiempo}:00</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="flex-1 text-[10px] font-bold">${p1.nombres}</div>
            <select id="m-${id}-0" class="w-14 bg-slate-800 h-9 text-sm" disabled>${Array.from({length:16},(_,v)=>`<option value="${v}">${v}</option>`).join('')}</select>
            <div class="text-[10px] text-slate-500 font-bold">VS</div>
            <select id="m-${id}-1" class="w-14 bg-slate-800 h-9 text-sm" disabled>${Array.from({length:16},(_,v)=>`<option value="${v}">${v}</option>`).join('')}</select>
            <div class="flex-1 text-[10px] font-bold text-right">${p2.nombres}</div>
        </div>
        <button onclick="confirmarPista(${id})" id="b-save-${id}" class="hidden w-full mt-3 py-2 bg-orange-600 rounded text-[10px] font-bold uppercase">Confirmar</button>
    </div>`;
}

function iniciarCronoMaster() {
    ejecutarBocina(); let t = (state.ronda > 3 ? 25 : state.tiempoRonda) * 60;
    const interval = setInterval(() => {
        t--; if(t <= 0) { clearInterval(interval); ejecutarBocina(); desbloquearTodo(); }
        document.querySelectorAll('[id^="t-"]').forEach(d => d.innerText = `${Math.floor(t/60)}:${(t%60)<10?'0':''}${t%60}`);
    }, 1000);
}

function desbloquearTodo() {
    document.querySelectorAll('select[id^="m-"]').forEach(s => s.disabled = false);
    document.querySelectorAll('button[id^="b-save-"]').forEach(b => b.classList.remove('hidden'));
    document.querySelectorAll('[id^="t-"]').forEach(d => d.innerText = "FIN");
    ejecutarBocina();
}

function confirmarPista(idx) {
    const rondas = [[[0,5], [1,4], [2,3]],[[0,3], [5,1], [4,2]],[[0,1], [3,4], [5,2]]];
    const pIds = rondas[state.ronda-1][idx];
    const m0 = parseInt(document.getElementById(`m-${idx}-0`).value);
    const m1 = parseInt(document.getElementById(`m-${idx}-1`).value);
    const p0 = state.parejas[pIds[0]]; const p1 = state.parejas[pIds[1]];
    if(m0 > m1) p0.pts += 3; else if(m1 > m0) p1.pts += 3; else { p0.pts += 1; p1.pts += 1; }
    p0.dg += (m0-m1); p1.dg += (m1-m0); p0.pj++; p1.pj++;
    document.getElementById(`b-save-${idx}`).classList.add('hidden');
    state.resultados++; refrescarTabla(); guardarEnDisco();
    if(state.resultados === 3) {
        document.getElementById('zona-controles').innerHTML = `<button onclick="proximaRonda()" class="btn-green bg-blue-600 mt-4 uppercase text-xs">${state.ronda<3?'Siguiente Ronda':'Ir a Semifinales'}</button>`;
    }
}

function proximaRonda() { 
    state.ronda++; document.getElementById('zona-controles').innerHTML = ""; 
    if(state.ronda > 3) { hacerFaseFinal(); } else { mostrarPartidos(); }
    guardarEnDisco();
}

function hacerFaseFinal() {
    state.resultados = 0; document.getElementById('fase-info').innerText = "FASE FINAL";
    document.getElementById('controles-master').innerHTML = `<button onclick="iniciarCronoMaster()" class="btn-play">▶ Iniciar Finales</button><button onclick="desbloquearTodo()" class="btn-fast">⚡ Desbloquear</button>`;
    const cont = document.getElementById('partidos-cont'); cont.innerHTML = "";
    
    // Final
    cont.innerHTML += `<p class="text-[9px] font-bold text-pink-500 uppercase tracking-widest text-center mb-1 italic">Gran Final</p>`;
    cont.innerHTML += generarTarjetaPartido('f', state.parejas[0], state.parejas[1], state.pistasReales[0], 25, true);
    
    // 3º y 4º
    if(state.con34) {
        cont.innerHTML += `<p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest text-center mt-4 mb-1 italic">3º y 4º Puesto</p>`;
        cont.innerHTML += generarTarjetaPartido('34', state.parejas[2], state.parejas[3], state.pistasReales[1], 25, false);
    }
    
    document.getElementById('zona-controles').innerHTML = `<button onclick="borrarCache()" class="btn-green bg-slate-700 mt-8 text-[10px]">FINALIZAR TORNEO Y BORRAR DATOS</button>`;
}

function refrescarTabla() {
    state.parejas.sort((a,b) => b.pts - a.pts || b.dg - a.dg);
    let h = `<table class="w-full text-[9px]"><tr><th class="text-left p-1">PAREJA</th><th class="text-center">PTS</th><th class="text-center">DG</th></tr>`;
    state.parejas.forEach((p, i) => { h += `<tr class="${i<4?'text-green-400 font-bold':'text-slate-400'} border-b border-slate-800/50"><td class="p-1">${p.nombres}</td><td class="text-center">${p.pts}</td><td class="text-center">${p.dg}</td></tr>`; });
    document.getElementById('tabla-puntos').innerHTML = h + `</table>`;
}

function ejecutarBocina() { try { const ctx = new AudioContext(); const o = ctx.createOscillator(); o.type='square'; o.frequency.value=200; o.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 1.2); } catch(e){} }
</script>
</body>
</html>
